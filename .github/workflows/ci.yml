name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: guardpoint_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -race -coverprofile=coverage.out

      - name: check swagger docs are up to date
        run: |
          go run github.com/swaggo/swag/cmd/swag@v1.16.6 init -g cmd/server/main.go -o docs
          git diff --exit-code docs/

      - name: integration tests
        run: go test ./... -tags integration -p 1 -count=1 -race
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5433/guardpoint_test?sslmode=disable

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8 # pinned to v1.x — .golangci.yml uses the v1 config schema
          # binario oficial v1.64.8 foi compilado com Go < 1.25 e falha com a
          # toolchain do go.mod; goinstall compila com o Go do proprio job
          install-mode: goinstall

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: guardpoint-server:ci
