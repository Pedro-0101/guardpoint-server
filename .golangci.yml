run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - unconvert
    - unparam
    - copyloopvar
    - errorlint
    - nilerr
    - prealloc
    - whitespace

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/guardpoint/guardpoint-server
  misspell:
    # dominios em portugues nos comentarios/campos
    ignore-words:
      - validade
      - correspondente
      - emergencias
      - comando
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf

issues:
  exclude-dirs:
    - vendor
    - bin
    - tmp
  exclude-files:
    - ".*\\.pb\\.go$"
    - ".*_test\\.go$"
