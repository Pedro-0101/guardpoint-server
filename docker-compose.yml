version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: guardpoint-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: guardpoint
      POSTGRES_PASSWORD: guardpoint
      POSTGRES_DB: guardpoint
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardpoint"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
