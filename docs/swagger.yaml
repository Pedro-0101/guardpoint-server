info:
  contact: {}
  description: API do sistema GuardPoint (controle de rondas/postos).
  title: GuardPoint API
  version: "1.0"
paths:
  /alertas:
    get:
      description: Para supervisores, os alertas sao automaticamente filtrados pelos
        postos aos quais estao vinculados (via posto_supervisores). Admins veem todos
